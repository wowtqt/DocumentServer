name: Build and Push Docker Image

on:
  push:
  workflow_dispatch:
    inputs:
      core_branch:
        description: 'Branch core'
        required: false
        default: ''
        type: string
      sdkjs_branch:
        description: 'Branch for sdkjs'
        required: false
        default: ''
        type: string
      web_apps_branch:
        description: 'Branch for web-apps'
        required: false
        default: ''
        type: string
      server_branch:
        description: 'Branch for server'
        required: false
        default: ''
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: euro-office/documentserver
  PRODUCT_VERSION: 9.2.1
  BUILD_ROOT: /package

jobs:
  clone:
    runs-on: self-hosted
    steps:
      - name: Checkout fork repository (with submodules)
        uses: actions/checkout@v6
        with:
          path: .
          submodules: recursive
          token: ${{ secrets.EURO_OFFICE_MIRROR_TOKEN }}

      - name: Align submodules to requested branches
        shell: bash
        env:
          CORE_BRANCH:    ${{ github.event.inputs.core_branch || '' }}
          SDKJS_BRANCH:   ${{ github.event.inputs.sdkjs_branch || '' }}
          WEBAPPS_BRANCH: ${{ github.event.inputs.web_apps_branch || '' }}
          SERVER_BRANCH:  ${{ github.event.inputs.server_branch || '' }}
        run: |
          set -euo pipefail

          # Helper that checks out a branch inside a submodule
          checkout_submodule() {
            local path=$1
            local branch=$2
            echo "🔧 Updating $path → $branch"
            pushd "$path" > /dev/null
            git fetch origin "${branch}:${branch}"   # ensure the branch exists locally
            git checkout "$branch"
            popd > /dev/null
          }

          # Only override if explicitly requested via workflow_dispatch.
          # On a normal PR push, use whatever commit the parent repo has pinned —
          # this is the correct behaviour: the submodule SHA in fork IS the source
          # of truth for which core commit to build.
          [ -n "$CORE_BRANCH" ]    && checkout_submodule core      "$CORE_BRANCH"
          [ -n "$SDKJS_BRANCH" ]   && checkout_submodule sdkjs     "$SDKJS_BRANCH"
          [ -n "$WEBAPPS_BRANCH" ] && checkout_submodule web-apps  "$WEBAPPS_BRANCH"
          [ -n "$SERVER_BRANCH" ]  && checkout_submodule server    "$SERVER_BRANCH"

          # These always track master, no pin needed
          checkout_submodule dictionaries       "master"
          checkout_submodule document-templates "master"

          echo "--- Submodule state after alignment ---"
          git submodule status

      - name: Cache clones
        uses: actions/cache@v4
        with:
          path: "${{ github.workspace }}"
          key: ${{ runner.os }}-build-${{ github.sha }}

  build:
    runs-on: self-hosted
    needs: clone
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - core
          - core-wasm
          - web-apps
          - server

    steps:
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: "${{ github.workspace }}"
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-${{ matrix.target }}-
            type=raw,value=${{ matrix.target }}-stage

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build/Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            PRODUCT_VERSION=${{ env.PRODUCT_VERSION }}
            BUILD_ROOT=${{ env.BUILD_ROOT }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.target }}-buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.target }}-buildcache,mode=max

  build-sdkjs:
    runs-on: self-hosted
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: "${{ github.workspace }}"
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-sdkjs-
            type=raw,value=sdkjs-stage

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build/Dockerfile
          target: sdkjs
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            PRODUCT_VERSION=${{ env.PRODUCT_VERSION }}
            BUILD_ROOT=${{ env.BUILD_ROOT }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:core-wasm-buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sdkjs-buildcache,mode=max

  combine:
    runs-on: self-hosted
    needs: build-sdkjs
    permissions:
      contents: read
      packages: write

    steps:
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: "${{ github.workspace }}"
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build/Dockerfile
          target: finalubuntu
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            PRODUCT_VERSION=${{ env.PRODUCT_VERSION }}
            BUILD_ROOT=${{ env.BUILD_ROOT }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:core-buildcache
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sdkjs-buildcache
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:web-apps-buildcache
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:server-buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:final-buildcache,mode=max

  build-develop:
    runs-on: self-hosted
    needs: combine
    permissions:
      contents: read
      packages: write

    steps:
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: "${{ github.workspace }}"
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-develop-
            type=raw,value=develop-stage
            type=raw,value=latest-dev,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build/Dockerfile
          target: develop
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            PRODUCT_VERSION=${{ env.PRODUCT_VERSION }}
            BUILD_ROOT=${{ env.BUILD_ROOT }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:final-buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-buildcache,mode=max