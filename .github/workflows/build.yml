name: Build and Push Docker Image

on:
  push:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to checkout for repositories'
        required: false
        default: 'fork'
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: euro-office/documentserver
  CHECKOUT_REF: ${{ github.event.inputs.ref || 'fork' }}

jobs:
  clone:
    runs-on: self-hosted
    steps:
      - name: Checkout fork repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          path: fork/

      - name: Checkout core
        uses: actions/checkout@v6
        with:
          repository: euro-office/core
          path: core/
          ref: ${{ env.CHECKOUT_REF }}
          token: ${{ secrets.EURO_OFFICE_MIRROR_TOKEN }}
          fetch-depth: 0

      - name: Checkout core-fonts
        uses: actions/checkout@v6
        with:
          repository: euro-office/core-fonts
          path: core-fonts/
          ref: ${{ env.CHECKOUT_REF }}
          token: ${{ secrets.EURO_OFFICE_MIRROR_TOKEN }}

      - name: Checkout sdkjs-plugins
        uses: actions/checkout@v6
        if: false
        with:
          repository: euro-office/onlyoffice.github.io
          path: onlyoffice.github.io/
          ref: master
          token: ${{ secrets.EURO_OFFICE_MIRROR_TOKEN }}

      - name: Checkout sdkjs
        uses: actions/checkout@v6
        with:
          repository: euro-office/sdkjs
          path: sdkjs/
          ref: ${{ env.CHECKOUT_REF }}
          token: ${{ secrets.EURO_OFFICE_MIRROR_TOKEN }}

      - name: Checkout web-apps
        uses: actions/checkout@v6
        with:
          repository: euro-office/web-apps
          path: web-apps/
          ref: ${{ env.CHECKOUT_REF }}
          token: ${{ secrets.EURO_OFFICE_MIRROR_TOKEN }}

      - name: Checkout server
        uses: actions/checkout@v6
        with:
          repository: euro-office/server
          path: server/
          ref: ${{ env.CHECKOUT_REF }}
          token: ${{ secrets.EURO_OFFICE_MIRROR_TOKEN }}

      - name: Cache clones
        uses: actions/cache@v4
        with:
          path: "${{ github.workspace }}"
          key: ${{ runner.os }}-build-${{ github.sha }}

  build:
    runs-on: self-hosted
    needs: clone
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - core
          - sdkjs
          - web-apps
          - server
          - fonts

    steps:
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: "${{ github.workspace }}"
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-${{ matrix.target }}-
            type=raw,value=${{ matrix.target }}-stage
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./fork/build/Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.target }}-buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.target }}-buildcache,mode=max

  combine:
    runs-on: self-hosted
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: "${{ github.workspace }}"
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./fork/build/Dockerfile
          target: finalupstream
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:core-stage
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sdkjs-stage
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:web-apps-stage
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:server-stage
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:fonts-stage
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max