name: Build and Push Docker Image

on:
  push:
  workflow_dispatch:
    inputs:
      core_branch:
        description: 'Branch core'
        required: false
        default: 'fork'
        type: string
      sdkjs_branch:
        description: 'Branch for sdkjs'
        required: false
        default: 'fork'
        type: string
      web_apps_branch:
        description: 'Branch for web-apps'
        required: false
        default: 'fork'
        type: string
      server_branch:
        description: 'Branch for server'
        required: false
        default: 'fork'
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: euro-office/documentserver
  PRODUCT_VERSION: 9.2.1
  BUILD_ROOT: /package

jobs:
  clone:
    runs-on: self-hosted
    steps:
      - name: Checkout fork repository (with submodules)
        uses: actions/checkout@v6
        with:
          path: .
          submodules: recursive
          token: ${{ secrets.EURO_OFFICE_MIRROR_TOKEN }}

      - name: Align submodules to requested branches
        shell: bash
        env:
          CORE_BRANCH:    ${{ github.event.inputs.core_branch || 'fork' }}
          SDKJS_BRANCH:   ${{ github.event.inputs.sdkjs_branch || 'fork' }}
          WEBAPPS_BRANCH: ${{ github.event.inputs.web_apps_branch || 'fork' }}
          SERVER_BRANCH:  ${{ github.event.inputs.server_branch || 'fork' }}
        run: |
          set -euo pipefail

          # Helper that checks out a branch inside a submodule
          checkout_submodule() {
            local path=$1
            local branch=$2
            echo "🔧 Updating $path → $branch"
            pushd "$path" > /dev/null
            git fetch origin "${branch}:${branch}"   # ensure the branch exists locally
            git checkout "$branch"
            popd > /dev/null
          }

          checkout_submodule core                "$CORE_BRANCH"
          checkout_submodule core-fonts          "$CORE_BRANCH"
          checkout_submodule sdkjs               "$SDKJS_BRANCH"
          checkout_submodule web-apps            "$WEBAPPS_BRANCH"
          checkout_submodule server              "$SERVER_BRANCH"
          checkout_submodule dictionaries        "master"
          checkout_submodule document-templates  "master"

      - name: Cache clones
        uses: actions/cache@v4
        with:
          path: "${{ github.workspace }}"
          key: ${{ runner.os }}-build-${{ github.sha }}

  build:
    runs-on: self-hosted
    needs: clone
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - core
          - core-wasm
          - web-apps
          - server

    steps:
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: "${{ github.workspace }}"
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        id: buildx

      # Prune the correct builder AFTER it is set up.
      # This clears both the layer cache AND the --mount=type=cache volumes
      # so cmake is forced to re-run from scratch including the gmock patch.
      - name: Clear BuildKit cache (core only)
        if: matrix.target == 'core'
        run: |
          docker buildx prune \
            --builder ${{ steps.buildx.outputs.name }} \
            --all \
            --force

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-${{ matrix.target }}-
            type=raw,value=${{ matrix.target }}-stage

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build/Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            PRODUCT_VERSION=${{ env.PRODUCT_VERSION }}
            BUILD_ROOT=${{ env.BUILD_ROOT }}
          labels: ${{ steps.meta.outputs.labels }}
          # For core: cache was just pruned above, so no cache-from needed.
          # For all other targets: pull from their respective registry cache.
          cache-from: ${{ matrix.target != 'core' && format('type=registry,ref={0}/{1}:{2}-buildcache', env.REGISTRY, env.IMAGE_NAME, matrix.target) || '' }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.target }}-buildcache,mode=max

  build-sdkjs:
    runs-on: self-hosted
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: "${{ github.workspace }}"
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-sdkjs-
            type=raw,value=sdkjs-stage

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build/Dockerfile
          target: sdkjs
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            PRODUCT_VERSION=${{ env.PRODUCT_VERSION }}
            BUILD_ROOT=${{ env.BUILD_ROOT }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:core-wasm-buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sdkjs-buildcache,mode=max

  combine:
    runs-on: self-hosted
    needs: build-sdkjs
    permissions:
      contents: read
      packages: write

    steps:
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: "${{ github.workspace }}"
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build/Dockerfile
          target: finalubuntu
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            PRODUCT_VERSION=${{ env.PRODUCT_VERSION }}
            BUILD_ROOT=${{ env.BUILD_ROOT }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:core-buildcache
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sdkjs-buildcache
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:web-apps-buildcache
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:server-buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:final-buildcache,mode=max

  build-packager:
    runs-on: self-hosted
    needs: combine
    permissions:
      contents: read
      packages: write

    steps:
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: "${{ github.workspace }}"
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push packager image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build/Dockerfile
          target: packager
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:packager
          build-args: |
            PRODUCT_VERSION=${{ env.PRODUCT_VERSION }}
            BUILD_ROOT=${{ env.BUILD_ROOT }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:final-buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:packager-buildcache,mode=max

  package:
    runs-on: self-hosted
    needs: build-packager
    permissions:
      contents: write
      packages: read

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build DEB and RPM packages
        run: |
          mkdir -p packages
          docker run --rm \
            -v "${{ github.workspace }}/packages:/out" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:packager \
            sh -c "
              build_deb.sh --name=euro-office-documentserver --version=${{ env.PRODUCT_VERSION }} --module=all && mv *.deb /out/
              build_rpm.sh --name=euro-office-documentserver --version=${{ env.PRODUCT_VERSION }} --module=all && mv *.rpm /out/
            "

      - name: Upload packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ github.sha }}
          path: packages/
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*

  build-develop:
    runs-on: self-hosted
    needs: combine
    permissions:
      contents: read
      packages: write

    steps:
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: "${{ github.workspace }}"
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-develop-
            type=raw,value=develop-stage
            type=raw,value=latest-dev,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./build/Dockerfile
          target: develop
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            PRODUCT_VERSION=${{ env.PRODUCT_VERSION }}
            BUILD_ROOT=${{ env.BUILD_ROOT }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:final-buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-buildcache,mode=max