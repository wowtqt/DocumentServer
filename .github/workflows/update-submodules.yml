name: Update submodules to latest fork branch

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily — after the mirror job (05:30 UTC)

jobs:
  update-submodules:
    runs-on: self-hosted
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout fork repo (main)
        uses: actions/checkout@v4
        with:
          ref: main
          submodules: recursive
          token: ${{ secrets.EURO_OFFICE_MIRROR_TOKEN }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name  "Euro-Office via GitHub Actions"
          git config user.email "actions@github.com"

      - name: Advance each submodule to latest fork/master commit
        run: |
          set -euo pipefail

          # Map of submodule path → branch to track
          declare -A BRANCHES=(
            [server]="fork"
            [web-apps]="fork"
            [sdkjs]="fork"
            [core]="fork"
            [core-fonts]="fork"
            [document-server-integration]="master"
            [dictionaries]="master"
            [document-templates]="master"
          )

          for path in "${!BRANCHES[@]}"; do
            branch="${BRANCHES[$path]}"
            if [ ! -d "$path" ]; then
              echo "Skipping $path — directory not found"
              continue
            fi
            echo "Updating $path → $branch"
            pushd "$path" > /dev/null
            git fetch origin
            git checkout "$branch"
            git reset --hard "origin/$branch"
            popd > /dev/null
          done

      - name: Open PR if submodule pointers changed
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.EURO_OFFICE_MIRROR_TOKEN }}
          branch: chore/nightly-submodule-bump
          base: main
          delete-branch: true
          commit-message: "chore: update submodules to latest fork branch"
          title: "chore: update submodules to latest fork branch"
          body: |
            Automated nightly submodule bump.

            Updates each submodule to the latest commit on its tracking branch:
            - `server`, `web-apps`, `sdkjs`, `core`, `core-fonts` → `fork`
            - `document-server-integration`, `dictionaries`, `document-templates` → `master`
