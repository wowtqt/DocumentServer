name: Euro-Office development environment

services:
  eo:
    image: ghcr.io/euro-office/documentserver:latest-dev
    build:
      context: ../
      dockerfile: ./build/Dockerfile
      # finalubuntu for full build, or develop to add build tools to the container
      target: develop
      args:
        PRODUCT_VERSION: "9.2.1"
        BUILD_ROOT: "/package"
    container_name: eo
    ports:
      - "8080:80"
    environment:
      ALLOW_PRIVATE_IP_ADDRESS: true
      USE_UNAUTHORIZED_STORAGE: true
      JWT_SECRET: secret
      THEME: euro-office
    volumes:
      - ../:/develop # mounts deployed files to application
      - ./setup/Makefile:/Makefile # mounts deployed files to application
  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    ports:
      - "8081:80"
    volumes:
      - /var/www/html
      - ./setup/enable-office.sh:/docker-entrypoint-hooks.d/post-installation/enable-office.sh:ro
    environment:
      NEXTCLOUD_TRUSTED_DOMAINS: 172.18.0.1 
      SQLITE_DATABASE: nextcloud
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: onlyoffice
    ports:
      - "8082:80"
    environment:
      ALLOW_PRIVATE_IP_ADDRESS: true
      USE_UNAUTHORIZED_STORAGE: true
      JWT_SECRET: secret

