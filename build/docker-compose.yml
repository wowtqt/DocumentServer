name: Euro-Office development environment

services:
  eo:
    image: ghcr.io/euro-office/documentserver:latest
    build:
      context: ../../
      dockerfile: ./fork/build/Dockerfile
      target: finalupstream
      args:
        PRODUCT_VERSION: 9.4.0
    container_name: eo
    ports:
      - "8080:80"
    environment:
      ALLOW_PRIVATE_IP_ADDRESS: true
      USE_UNAUTHORIZED_STORAGE: true
      JWT_SECRET: secret
    # volumes:
    # Those volumes can be used to override built-in web-apps and sdkjs with local versions for development purposes
    #  - ../web-apps/deploy/web-apps:/var/www/onlyoffice/documentserver/web-apps:ro
    #  - ../sdkjs/deploy/sdkjs:/var/www/onlyoffice/documentserver/sdkjs:ro
  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    ports:
      - "8081:80"
    volumes:
      - /var/www/html
      - ./../../onlyoffice-nextcloud:/var/www/html/custom_apps/onlyoffice
    environment:
      NEXTCLOUD_TRUSTED_DOMAINS: 172.18.0.1 
      SQLITE_DATABASE: nextcloud
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: onlyoffice
    ports:
      - "8082:80"
    environment:
      ALLOW_PRIVATE_IP_ADDRESS: true
      USE_UNAUTHORIZED_STORAGE: true
      JWT_SECRET: secret

