name: Euro-Office development environment

services:
  eo:
    image: ghcr.io/euro-office/documentserver:latest
    build:
      context: ../../
      dockerfile: ./fork/build/Dockerfile
      # finalupstream for full build, or develop to add build tools to the container
      target: develop
    container_name: eo
    ports:
      - "8080:80"
    environment:
      ALLOW_PRIVATE_IP_ADDRESS: true
      USE_UNAUTHORIZED_STORAGE: true
      JWT_SECRET: secret
    volumes:
    # Those volumes can be used to override built-in components with local versions for development purposes
      - ../../web-apps:/var/www/onlyoffice/web-apps-develop # dev folder, run builds in here
      - ../../web-apps/deploy/web-apps:/var/www/onlyoffice/documentserver/web-apps:ro # mounts deployed files to application
    #  - ../../sdkjs/deploy/sdkjs:/var/www/onlyoffice/documentserver/sdkjs:ro
  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    ports:
      - "8081:80"
    volumes:
      - /var/www/html
      - ./enable-office.sh:/docker-entrypoint-hooks.d/post-installation/enable-office.sh:ro
    environment:
      NEXTCLOUD_TRUSTED_DOMAINS: 172.18.0.1 
      SQLITE_DATABASE: nextcloud
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: onlyoffice
    ports:
      - "8082:80"
    environment:
      ALLOW_PRIVATE_IP_ADDRESS: true
      USE_UNAUTHORIZED_STORAGE: true
      JWT_SECRET: secret

